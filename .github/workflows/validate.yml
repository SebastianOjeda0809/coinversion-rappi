name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint HTML and JS
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Extract and syntax-check inline JS
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const os = require('os');
          const { execSync } = require('child_process');

          const html = fs.readFileSync('index.html', 'utf8');

          // Basic HTML sanity: must contain <html>, <head>, <body>, be closed.
          const required = ['<html', '</html>', '<head', '</head>', '<body', '</body>'];
          for (const tag of required) {
            if (!html.includes(tag)) {
              console.error('HTML missing required tag:', tag);
              process.exit(1);
            }
          }

          // Extract every non-external <script>...</script> block.
          const re = /<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/gi;
          let m, idx = 0, failed = false;
          while ((m = re.exec(html)) !== null) {
            const js = m[1];
            if (!js.trim()) continue;
            // Wrap in async IIFE so top-level await is valid if present.
            const wrapped = '(async()=>{\n' + js + '\n})();\n';
            const tmp = path.join(os.tmpdir(), `inline_${idx++}.mjs`);
            fs.writeFileSync(tmp, wrapped);
            try {
              execSync(`node --check "${tmp}"`, { stdio: 'pipe' });
              console.log('OK inline script #' + idx + ' (' + js.length + ' chars)');
            } catch (e) {
              failed = true;
              console.error('Syntax error in inline <script> #' + idx);
              console.error(e.stderr ? e.stderr.toString() : e.message);
            }
          }
          if (idx === 0) {
            console.warn('No inline scripts found.');
          }
          if (failed) process.exit(1);
          EOF

  test:
    name: Run Vitest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --run
